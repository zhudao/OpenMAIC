name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please search existing issues for duplicates, then describe the user problem and a testable outcome below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What observable outcomes would make this feature complete?
      placeholder: |
        - [ ] A user can ...
        - [ ] The system shows ...
        - [ ] Existing ... continues to work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of the project does this relate to?
      options:
        - Classroom generation
        - Multi-agent interaction
        - Playback / presentation
        - Editor / canvas
        - Import / export
        - Storage / persistence
        - Quiz / Assessment
        - Model / provider integration
        - Interactive simulations
        - OpenClaw integration
        - UI / UX
        - Deployment / infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any mockups, screenshots, or references that help explain the feature.
